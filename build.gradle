plugins {
    id 'java-library'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.0.145'
}

version = project.mod_version
group = 'com.github.aeddddd'

base {
    archivesName = 'AE2Enhanced'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(project.java_version.toInteger())

runs {
    configureEach {
        workingDirectory project.file('run')
        modSource project.sourceSets.main
    }
    client {
        systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
    }
    server {
        systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
        programArgument '--nogui'
    }
    data {
        programArguments.addAll '--mod', project.mod_id, '--all', '--output',
                file('src/generated/resources/').getAbsolutePath(), '--existing',
                file('src/main/resources/').getAbsolutePath()
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
    maven { url = 'https://modmaven.dev/' }
    maven { url = 'https://repo.spongepowered.org/maven/' }
    maven { url = 'https://www.cursemaven.com' }
    maven { url = 'https://maven.blamejared.com' }
}

dependencies {
    implementation "net.neoforged:forge:${project.neo_version}"
    implementation 'appeng:appliedenergistics2-forge:15.3.4'
    compileOnly 'org.spongepowered:mixin:0.8.7'
    annotationProcessor 'org.spongepowered:mixin:0.8.7:processor'
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            version: version,
            mod_id: project.mod_id,
            mod_name: project.mod_name
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml']) {
        expand replaceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += [
            '-AoutRefMapFile=' + file("${project.buildDir}/classes/java/main/mixins.ae2enhanced.refmap.json").absolutePath
    ]
}

tasks.register('copyMixinRefmap', Copy) {
    group = 'build'
    from("${project.buildDir}/classes/java/main/mixins.ae2enhanced.refmap.json")
    into("${project.buildDir}/resources/main")
    dependsOn(tasks.compileJava)
}

tasks.jar {
    dependsOn(tasks.copyMixinRefmap)
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes(
                'MixinConfigs': 'mixins.ae2enhanced.json'
        )
    }
}

tasks.register('obfuscateJar', net.neoforged.gradle.common.runtime.naming.tasks.UnapplyOfficialMappingsToCompiledJar) {
    dependsOn(tasks.jar)
    getRuntimeName().set('AE2Enhanced')
    getRuntimeDirectory().set(layout.buildDirectory.dir('reobfRuntime'))
    getInput().set(tasks.jar.archiveFile)
    getMinecraftVersion().set(project.neo_version.split('-')[0])
    getDistribution().set(net.neoforged.gradle.dsl.common.util.DistributionType.CLIENT)
    getStepName().set('obfuscateJar')
    getOutputFileName().set(tasks.jar.archiveFileName)
    getOutputDirectory().set(layout.buildDirectory.dir('reobf'))
}

tasks.register('reobfJar', Exec) {
    dependsOn(tasks.obfuscateJar)

    def fartJar = project.configurations.detachedConfiguration(
            project.dependencies.create('net.minecraftforge:ForgeAutoRenamingTool:1.0.2:all')
    ).files.find { it.name.endsWith('-all.jar') }
    def mappingFile = tasks.named('neoFormMergeMappings').flatMap { it.output }
    def inputJar = tasks.named('obfuscateJar').flatMap { it.output }
    def outputJar = layout.buildDirectory.file("libs/${tasks.jar.archiveFileName.get()}")
    def libsFile = layout.buildDirectory.file('reobf/fart_libraries.txt')

    doFirst {
        libsFile.get().asFile.parentFile.mkdirs()
        libsFile.get().asFile.text = ''
        libsFile.get().asFile << "-e=${file("${System.getProperty('user.home')}/.gradle/caches/minecraft/versions/1.20.1/client.jar").absolutePath}\n"
        sourceSets.main.runtimeClasspath.files.each { libsFile.get().asFile << "-e=${it.absolutePath}\n" }
    }

    commandLine('java', '-jar', fartJar,
            '--input', inputJar.get().asFile,
            '--output', outputJar.get().asFile,
            '--map', mappingFile.get().asFile,
            '--cfg', libsFile.get().asFile,
            '--ann-fix', '--ids-fix', '--src-fix', '--record-fix')
}

tasks.jar.finalizedBy('reobfJar')

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
