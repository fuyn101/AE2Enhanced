plugins {
    id 'java'
    id 'xyz.wagyourtail.unimined' version '1.4.23-kappa'
}

version = '1.5.4-ae2s'
group = 'com.github.aeddddd'

base {
    archivesName = 'AE2Enhanced'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = targetCompatibility = JavaVersion.VERSION_25
}

compileJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-Xmaxerrs', '0']
}


repositories {
    mavenCentral()
    maven { url = 'https://maven.cleanroommc.com' }
    maven { url = 'https://cursemaven.com' }
    maven { url = 'https://maven.blamejared.com' }
    maven { url = 'https://repo.spongepowered.org/maven' }
    maven { url = 'https://dvs1.progwml6.com/files/maven' }
}

configurations {
    modCompileOnly
    compileOnly.extendsFrom(modCompileOnly)
    modRuntimeOnly
    runtimeOnly.extendsFrom(modRuntimeOnly)
}

unimined.minecraft {
    version '1.12.2'

    mappings {
        mcp('stable', '39-1.12')
    }

    cleanroom {
        loader '0.5.14-alpha'
        runs.auth.username = 'Developer'
        runs.all {
            systemProperty('crl.dev.mixin', 'mixins.ae2enhanced.late.json')
        }
    }

    defaultRemapJar = true

    mods {
        remap(configurations.modCompileOnly)
        remap(configurations.modRuntimeOnly)
    }
}

dependencies {
    // AE2 Supergiant (already MCP-mapped dev jar, add as normal implementation)
    implementation files('libs/AppliedEnergistics2-Supergiant-1.0.4.jar')
    modRuntimeOnly files('libs/AppliedEnergistics2-Supergiant-1.0.4.jar')

    // Optional AE2S addon channels
    modCompileOnly files('libs/mekeng-1.1.0.jar')
    modRuntimeOnly files('libs/mekeng-1.1.0.jar')
    modCompileOnly files('libs/appbot-1.0.0.jar')
    modRuntimeOnly files('libs/appbot-1.0.0.jar')

    // Optional mod compat (provided in libs/, remapped for dev)
    compileOnly files('libs/StorageDrawers-1.12.2-5.5.0.jar')
    compileOnly files('libs/FunctionalStorageLegacy-1.0.3-beta.jar')
    modCompileOnly files('libs/Mekanism-1.12.2-9.8.3.390.jar')
    modCompileOnly files('libs/MekanismEnergistics-0.1.5.jar')
    modCompileOnly files('libs/Thaumcraft-1.12.2-6.1.BETA26.jar')
    modCompileOnly files('libs/thaumic-energistics-extended-life-1.12.2-2.3.5.jar')
    modCompileOnly files('libs/Baubles-1.12-1.5.2.jar')
    compileOnly files('libs/Baubles-1.12-1.5.2.jar')
    modCompileOnly files('libs/Botania r1.10-364.4.jar')
    modCompileOnly files('libs/BloodMagic-1.12.2-2.4.3-105.jar')
    modCompileOnly files('libs/ActuallyAdditions-1.12.2-r152.jar')
    modCompileOnly files('libs/CoFHCore-1.12.2-4.6.6.1-universal.jar')
    modCompileOnly files('libs/ThermalExpansion-1.12.2-5.5.7.1-universal.jar')
    modCompileOnly files('libs/ThermalFoundation-1.12.2-2.6.7.1-universal.jar')
    modCompileOnly files('libs/EnderIO-1.12.2-5.3.72.jar')
    modCompileOnly files('libs/EnderCore-1.12.2-0.5.78.jar')
    modCompileOnly files('libs/industrialforegoing-1.12.2-1.12.13-237.jar')
    modCompileOnly files('libs/AutoSave-1.12.2-1.0.11.jar')
    modCompileOnly files('libs/RebornCore-1.12.2-3.19.4.529-universal.jar')
    modCompileOnly files('libs/TechReborn-1.12.2-2.27.3.1084-universal.jar')
    modCompileOnly files('libs/nuclearcraft-1.12.2-2o.9.7.jar')
    modCompileOnly files('libs/Draconic-Evolution-1.12.2-2.3.28.354-universal.jar')
    modCompileOnly files('libs/extendedcrafting-nomifactory-edition-1.7.0.6.jar')
    modCompileOnly files('libs/ProjectE-1.12.2-PE1.4.1.jar')

    // Fastutil for runtime shading
    implementation 'it.unimi.dsi:fastutil:8.5.12'

    compileOnly 'com.google.code.findbugs:jsr305:3.0.2'

    modCompileOnly 'mezz.jei:jei_1.12.2:4.16.1.302:api'
    modCompileOnly 'mezz.jei:jei_1.12.2:4.16.1.302'
    modCompileOnly 'CraftTweaker2:CraftTweaker2-MC1120-Main:1.12-4.1.20.574'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
}

test {
    useJUnitPlatform()
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    inputs.property 'version', project.version
    inputs.property 'mcversion', '1.12.2'
    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version': project.version, 'mcversion': '1.12.2'
    }
    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}

jar {
    // Exclude JEI compile-time stubs from the final jar
    exclude 'mezz/jei/**'

    // Shade fastutil and trim unused primitive packages
    from {
        configurations.runtimeClasspath.findAll { it.name.contains('fastutil') }.collect { zipTree(it) }
    }

    exclude 'it/unimi/dsi/fastutil/doubles/**'
    exclude 'it/unimi/dsi/fastutil/shorts/**'
    exclude 'it/unimi/dsi/fastutil/floats/**'
    exclude 'it/unimi/dsi/fastutil/chars/**'
    exclude 'it/unimi/dsi/fastutil/bytes/**'
    exclude 'it/unimi/dsi/fastutil/booleans/**'
    exclude 'it/unimi/dsi/fastutil/io/**'

    exclude 'it/unimi/dsi/fastutil/objects/Object2Double*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Float*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Short*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Char*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Byte*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Boolean*'
    exclude 'it/unimi/dsi/fastutil/objects/*Double*'
    exclude 'it/unimi/dsi/fastutil/objects/*Float*'
    exclude 'it/unimi/dsi/fastutil/objects/*Short*'
    exclude 'it/unimi/dsi/fastutil/objects/*Char*'
    exclude 'it/unimi/dsi/fastutil/objects/*Byte*'
    exclude 'it/unimi/dsi/fastutil/objects/*Boolean*'

    exclude 'it/unimi/dsi/fastutil/longs/Long2Double*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Float*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Short*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Char*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Byte*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Boolean*'
    exclude 'it/unimi/dsi/fastutil/longs/*Double*'
    exclude 'it/unimi/dsi/fastutil/longs/*Float*'
    exclude 'it/unimi/dsi/fastutil/longs/*Short*'
    exclude 'it/unimi/dsi/fastutil/longs/*Char*'
    exclude 'it/unimi/dsi/fastutil/longs/*Byte*'
    exclude 'it/unimi/dsi/fastutil/longs/*Boolean*'

    exclude 'it/unimi/dsi/fastutil/ints/Int2Double*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Float*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Short*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Char*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Byte*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Boolean*'
    exclude 'it/unimi/dsi/fastutil/ints/*Double*'
    exclude 'it/unimi/dsi/fastutil/ints/*Float*'
    exclude 'it/unimi/dsi/fastutil/ints/*Short*'
    exclude 'it/unimi/dsi/fastutil/ints/*Char*'
    exclude 'it/unimi/dsi/fastutil/ints/*Byte*'
    exclude 'it/unimi/dsi/fastutil/ints/*Boolean*'

    manifest {
        attributes([
            'MixinConfigs': 'mixins.ae2enhanced.late.json',
            'ModType': 'CRL'
        ])
    }
}
