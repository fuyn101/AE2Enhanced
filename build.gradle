buildscript {
    repositories {
        jcenter()
        maven { url = "https://files.minecraftforge.net/maven" }
        maven { url = "https://repo.spongepowered.org/repository/maven-public/" }
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:2.3-SNAPSHOT'
        classpath 'org.spongepowered:mixingradle:0.6-SNAPSHOT'
    }
}
apply plugin: 'net.minecraftforge.gradle.forge'
apply plugin: 'org.spongepowered.mixin'

version = '1.5.4-fix1'
group = 'com.github.aeddddd'
archivesBaseName = 'AE2Enhanced'

sourceCompatibility = targetCompatibility = '1.8'
compileJava {
    sourceCompatibility = targetCompatibility = '1.8'
    options.encoding = 'UTF-8'
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
    }
}

minecraft {
    version = '1.12.2-14.23.5.2768'
    runDir = 'run'
    mappings = 'stable_39'
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.cleanroommc.com' }
    maven { url = 'https://dvs1.progwml6.com/files/maven' }
    maven { url = 'https://maven.blamejared.com' }
}

dependencies {
    compile files('libs/ae2-uel-v0.56.7.jar')
    compileOnly files('libs/ae2fc-2.7.10-unofficial.jar')
    compileOnly files('libs/Mekanism-1.12.2-9.8.3.390.jar')
    compileOnly files('libs/MekanismEnergistics-0.1.5.jar')
    compileOnly files('libs/Thaumcraft-1.12.2-6.1.BETA26.jar')
    compileOnly files('libs/thaumic-energistics-extended-life-1.12.2-2.3.5.jar')
    compileOnly files('libs/Baubles-1.12-1.5.2.jar')
    compileOnly files('libs/Botania r1.10-364.4.jar')
    compileOnly files('libs/terminal_interaction_integration-1.0.jar')
    compileOnly files('libs/BloodMagic-1.12.2-2.4.3-105.jar')
    compileOnly files('libs/ActuallyAdditions-1.12.2-r152.jar')
    compileOnly files('libs/CoFHCore-1.12.2-4.6.6.1-universal.jar')
    compileOnly files('libs/ThermalExpansion-1.12.2-5.5.7.1-universal.jar')
    compileOnly files('libs/ThermalFoundation-1.12.2-2.6.7.1-universal.jar')
    compileOnly files('libs/EnderIO-1.12.2-5.3.72.jar')
    compileOnly files('libs/EnderCore-1.12.2-0.5.78.jar')
    compileOnly files('libs/industrialforegoing-1.12.2-1.12.13-237.jar')
    compileOnly files('libs/AutoSave-1.12.2-1.0.11.jar')
    compileOnly files('libs/RebornCore-1.12.2-3.19.4.529-universal.jar')
    compileOnly files('libs/TechReborn-1.12.2-2.27.3.1084-universal.jar')
    compileOnly files('libs/nuclearcraft-1.12.2-2o.9.7.jar')
    compileOnly files('libs/Draconic-Evolution-1.12.2-2.3.28.354-universal.jar')
    compileOnly files('libs/extendedcrafting-nomifactory-edition-1.7.0.6.jar')
    // fastutil: 高性能集合库,打包进 jar
    compile 'it.unimi.dsi:fastutil:8.5.12'

    compile files('libs/!mixinbooter-10.6.jar')
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'

    deobfProvided 'mezz.jei:jei_1.12.2:4.16.1.302:api'
    deobfProvided 'mezz.jei:jei_1.12.2:4.16.1.302'
    deobfProvided 'CraftTweaker2:CraftTweaker2-MC1120-Main:1.12-4.1.20.574'
}

test {
    useJUnitPlatform()
}

mixin {
    add sourceSets.main, 'mixin.refmap.json'
}

processResources {
    inputs.property 'version', project.version
    inputs.property 'mcversion', project.minecraft.version
    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version':project.version, 'mcversion':project.minecraft.version
    }
    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}

// runClient 时自动检测 HEI：若 mods 文件夹中存在 HEI,则排除原版 JEI jar,
// 避免原版 JEI 与 HEI 的类冲突；若只有原版 JEI,则保持兼容.
afterEvaluate {
    tasks.runClient {
        doFirst {
            def hasHEI = fileTree('run/mods').matching { include '**/HadEnoughItems*.jar' }.files.size() > 0
            if (hasHEI) {
                classpath = classpath.filter { file ->
                    !file.name.contains('jei_1.12.2-4.16.1')
                }
                println "[AE2Enhanced] Detected HEI in run/mods, excluded vanilla JEI from runtime classpath."
            }
        }
    }
}

jar {
    // 排除 JEI 内部类的编译期 stub,避免与运行时 JEI/HEI 的类冲突
    exclude 'mezz/jei/**'
    
    // 打包 fastutil 并手动瘦身,排除不相关的原始类型包
    from {
        configurations.compile.findAll { it.name.contains('fastutil') }.collect { zipTree(it) }
    }
    
    // 排除 fastutil 中不相关的原始类型包
    exclude 'it/unimi/dsi/fastutil/doubles/**'
    exclude 'it/unimi/dsi/fastutil/shorts/**'
    exclude 'it/unimi/dsi/fastutil/floats/**'
    exclude 'it/unimi/dsi/fastutil/chars/**'
    exclude 'it/unimi/dsi/fastutil/bytes/**'
    exclude 'it/unimi/dsi/fastutil/booleans/**'
    exclude 'it/unimi/dsi/fastutil/io/**'
    
    // 进一步排除 objects/longs/ints 包中与其他原始类型组合的类
    exclude 'it/unimi/dsi/fastutil/objects/Object2Double*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Float*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Short*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Char*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Byte*'
    exclude 'it/unimi/dsi/fastutil/objects/Object2Boolean*'
    exclude 'it/unimi/dsi/fastutil/objects/*Double*'
    exclude 'it/unimi/dsi/fastutil/objects/*Float*'
    exclude 'it/unimi/dsi/fastutil/objects/*Short*'
    exclude 'it/unimi/dsi/fastutil/objects/*Char*'
    exclude 'it/unimi/dsi/fastutil/objects/*Byte*'
    exclude 'it/unimi/dsi/fastutil/objects/*Boolean*'
    
    exclude 'it/unimi/dsi/fastutil/longs/Long2Double*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Float*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Short*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Char*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Byte*'
    exclude 'it/unimi/dsi/fastutil/longs/Long2Boolean*'
    exclude 'it/unimi/dsi/fastutil/longs/*Double*'
    exclude 'it/unimi/dsi/fastutil/longs/*Float*'
    exclude 'it/unimi/dsi/fastutil/longs/*Short*'
    exclude 'it/unimi/dsi/fastutil/longs/*Char*'
    exclude 'it/unimi/dsi/fastutil/longs/*Byte*'
    exclude 'it/unimi/dsi/fastutil/longs/*Boolean*'
    
    exclude 'it/unimi/dsi/fastutil/ints/Int2Double*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Float*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Short*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Char*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Byte*'
    exclude 'it/unimi/dsi/fastutil/ints/Int2Boolean*'
    exclude 'it/unimi/dsi/fastutil/ints/*Double*'
    exclude 'it/unimi/dsi/fastutil/ints/*Float*'
    exclude 'it/unimi/dsi/fastutil/ints/*Short*'
    exclude 'it/unimi/dsi/fastutil/ints/*Char*'
    exclude 'it/unimi/dsi/fastutil/ints/*Byte*'
    exclude 'it/unimi/dsi/fastutil/ints/*Boolean*'
    
    manifest {
        attributes([
            'FMLCorePluginContainsFMLMod': true,
            'ForceLoadAsMod': true,
            'FMLCorePlugin': 'com.github.aeddddd.ae2enhanced.mixin.AssemblyMixinPlugin'
        ])
    }
}
